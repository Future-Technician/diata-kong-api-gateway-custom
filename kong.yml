_format_version: "3.0"

plugins:
  - name: cors
    config:
      origins:
        - http://localhost:5173
        - https://admin.diata.my.id
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - X-User-ID
        - X-User-Name
        - x-user-id
        - x-user-name
      credentials: true

services:
  - name: auth-service
    url: http://be-auth-service:5000

  - name: goal-service
    url: http://be-goal-service:5001

  - name: finance-service
    url: http://be-finance-service:5004

routes:
  - name: auth-routes
    service: auth-service
    paths:
      - /api/auth
      - /api/users
    strip_path: false

  - name: goal-routes
    service: goal-service
    paths:
      - /api/goals
      - /api/targets
      - /api/tasks
      - /api/microtasks
      - /api/difficulties
    strip_path: false
    plugins:
      - name: jwt-custom
        config:
          cookie_names:
            - access_token
          key_claim_name: iss
          claims_to_verify:
            - exp
            - nbf
          run_on_preflight: true

  - name: finance-routes
    service: finance-service
    paths:
      - /api/finances
    strip_path: false
    plugins:
      - name: jwt-custom
        config:
          cookie_names:
            - access_token
          key_claim_name: iss
          claims_to_verify:
            - exp
            - nbf
          run_on_preflight: true

consumers:
  - username: generic-jwt-consumer
    jwt_custom_secrets:
      - key:
        secret:
        algorithm:
