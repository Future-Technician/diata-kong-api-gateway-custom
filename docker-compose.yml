networks:
  frontend_diata_admin:
    external: true
  backend_diata_admin:
    external: true

services:
  kong-gateway:
    image: kong:3.7
    container_name: kong-gateway
    restart: on-failure
    env_file:
      - .env
    volumes:
      - ./kong.yml:/usr/local/kong/declarative/kong.yml:ro
      - ./kong-plugins/jwt-custom:/usr/local/share/lua/5.1/kong/plugins/jwt-custom:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: "/usr/local/kong/declarative/kong.yml"
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      TZ: Asia/Jakarta
      KONG_PLUGINS: "bundled,jwt-custom"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=frontend_diata_admin"
      - "traefik.http.routers.kong-proxy.rule=Host(`admin.diata.my.id`) && PathPrefix(`/api`)"
      - "traefik.http.routers.kong-proxy.priority=100"
      - "traefik.http.routers.kong-proxy.entrypoints=websecure"
      - "traefik.http.routers.kong-proxy.tls.certresolver=le"
      - "traefik.http.routers.kong-proxy.service=kong-svc"
      - "traefik.http.services.kong-svc.loadbalancer.server.port=8000"
    ports:
      - "5002:8000"
      - "8001:8001"
    networks:
      - frontend_diata_admin
      - backend_diata_admin
    extra_hosts:
      - "host.docker.internal:host-gateway"
